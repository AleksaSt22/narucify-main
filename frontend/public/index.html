<!doctype html>
<html lang="sr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#09090b" />
        <meta name="description" content="Narucify — platforma za upravljanje narudžbinama za Instagram i WhatsApp prodavce. Online prodavnica, praćenje narudžbina, baza kupaca i analitika." />

        <!-- Favicon -->
        <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://narucify.com/" />
        <meta property="og:title" content="Narucify — Upravljaj narudžbinama kao profesionalac" />
        <link rel="canonical" href="https://narucify.com/" />
        <meta property="og:description" content="Online prodavnica, praćenje narudžbina, baza kupaca i analitika — sve na jednom mestu. 21 dan besplatno." />
        <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Narucify — Upravljaj narudžbinama kao profesionalac" />
        <meta name="twitter:description" content="Online prodavnica, praćenje narudžbina, baza kupaca i analitika — sve na jednom mestu. 21 dan besplatno." />
        <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

        <title>Narucify — Upravljaj narudžbinama kao profesionalac</title>

        <!-- Google Sign-In -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>

        <!-- JSON-LD Structured Data -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "Narucify",
            "url": "https://narucify.com",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "description": "Platforma za upravljanje narudžbinama za Instagram i WhatsApp prodavce. Online prodavnica, praćenje narudžbina, baza kupaca i analitika.",
            "offers": [
                {
                    "@type": "Offer",
                    "name": "Starter",
                    "price": "0",
                    "priceCurrency": "RSD",
                    "description": "Besplatan plan za početnike — do 15 proizvoda"
                },
                {
                    "@type": "Offer",
                    "name": "Rast",
                    "price": "2499",
                    "priceCurrency": "RSD",
                    "description": "Za rastući biznis — do 50 proizvoda, Shop Customizer"
                },
                {
                    "@type": "Offer",
                    "name": "Biznis",
                    "price": "3899",
                    "priceCurrency": "RSD",
                    "description": "Za profesionalne prodavce — neograničen broj proizvoda, sve funkcije"
                }
            ],
            "aggregateRating": {
                "@type": "AggregateRating",
                "ratingValue": "4.8",
                "ratingCount": "500"
            }
        }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
