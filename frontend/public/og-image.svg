<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#1c1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="600" cy="280" rx="500" ry="300" fill="#f97316" opacity="0.04"/>
  <!-- Icon -->
  <rect x="80" y="200" width="72" height="72" rx="16" fill="url(#iconG)"/>
  <g transform="translate(116,236)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-14,-7 L-9,-16 H9 L14,-7"/>
    <circle cx="-8" cy="9" r="3" fill="#fff"/>
    <circle cx="8" cy="9" r="3" fill="#fff"/>
    <path d="M-16,-7 H16 L12,5 H-12 Z"/>
  </g>
  <!-- Brand name -->
  <text x="170" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="#ffffff">Narucify</text>
  <!-- Headline -->
  <text x="80" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="800" fill="#ffffff">Upravljaj narudžbinama</text>
  <text x="80" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="800" fill="url(#accent)">kao profesionalac.</text>
  <!-- Subtitle -->
  <text x="80" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#a1a1aa">Online prodavnica · Praćenje narudžbina · Analitika</text>
  <!-- CTA pill -->
  <rect x="80" y="520" width="320" height="52" rx="26" fill="url(#accent)"/>
  <text x="240" y="553" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Probaj 21 dan besplatno →</text>
  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
