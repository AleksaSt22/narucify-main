services:
  - type: web
    name: narucify-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: narucify
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@narucify.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "Narucify <onboarding@resend.dev>"
      - key: PYTHON_VERSION
        value: "3.13.7"
